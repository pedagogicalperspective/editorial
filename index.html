<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PedPer — Editorial Board Profile Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f7f4;--sf:#fff;--sa:#f2f0ec;--bd:#e2dfd8;--bl:#ece9e2;--tx:#2c2a25;--tm:#8a8680;--tl:#b0aaa2;--pr:#1b2a4a;--pl:#2e5fa1;--ac:#c8782a;--al:#f5e6d0;--gn:#2d6a3f;--gb:#e8f5e9;--rd:#b33a3a;--rb:#fce8e8;--r:8px;--sh:0 1px 3px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);line-height:1.6}
header{background:var(--pr);color:#fff;padding:2rem 0 1.5rem}.wrap{max-width:1260px;margin:0 auto;padding:0 1.5rem}
header h1{font-family:'Source Serif 4',serif;font-size:1.65rem;font-weight:700}header .sub{color:rgba(255,255,255,.5);font-size:.8rem;margin-top:.15rem}header .sub a{color:rgba(255,255,255,.7);text-decoration:underline}
.hr{display:flex;gap:.5rem;margin-top:.8rem;flex-wrap:wrap}.bdg{display:inline-flex;align-items:center;gap:.25rem;padding:.2rem .6rem;border-radius:20px;font-size:.7rem;font-weight:600}.bdg.g{background:rgba(45,106,63,.25);color:#a0eaaf}.bdg.r{background:rgba(179,58,58,.2);color:#f5a0a0}.bdg.y{background:rgba(160,124,28,.25);color:#f0d060}
.tb{max-width:1260px;margin:1rem auto 0;padding:0 1.5rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.tb input[type=text]{flex:1;min-width:170px;padding:.5rem .8rem;border:1px solid var(--bd);border-radius:var(--r);font-family:inherit;font-size:.82rem;background:var(--sf);outline:none}.tb input:focus{border-color:var(--pl)}
.tb select{padding:.5rem .65rem;border:1px solid var(--bd);border-radius:var(--r);font-family:inherit;font-size:.82rem;background:var(--sf);cursor:pointer;outline:none}
.fb{padding:.45rem .8rem;border:1px solid var(--bd);border-radius:var(--r);font-family:inherit;font-size:.76rem;font-weight:600;cursor:pointer;background:var(--sf);transition:all .15s}.fb:hover{background:var(--sa)}.fb.on{background:var(--pr);color:#fff;border-color:var(--pr)}
.tl{display:flex;gap:.3rem;margin-left:auto}.tl a{padding:.35rem .55rem;border-radius:var(--r);font-size:.66rem;font-weight:600;text-decoration:none;border:1px solid var(--bd);color:var(--tm);transition:all .15s}.tl a:hover{border-color:var(--pl);color:var(--pr)}
.dash{max-width:1260px;margin:.8rem auto;padding:0 1.5rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.5rem}
.sc{background:var(--sf);border:1px solid var(--bl);border-radius:var(--r);padding:.75rem .9rem;box-shadow:var(--sh)}.sc .lb{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--tm);margin-bottom:.25rem}.sc .nm{font-family:'Source Serif 4',serif;font-size:1.4rem;font-weight:700;color:var(--pr)}.sc .dt{font-size:.65rem;color:var(--tm)}.sc .bar{margin-top:.35rem;height:4px;background:var(--bl);border-radius:2px;overflow:hidden}.sc .bf{height:100%;border-radius:2px;transition:width .5s}
.acts{max-width:1260px;margin:.7rem auto;padding:0 1.5rem;display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
.ab{padding:.5rem 1rem;border:none;border-radius:var(--r);font-family:inherit;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.3rem}
.ab.exp{background:var(--gn);color:#fff}.ab.exp:hover{background:#245a33}.ab.sav{background:var(--pr);color:#fff}.ab.sav:hover{background:#142240}.ab.rst{background:var(--rb);color:var(--rd);border:1px solid #e8c0c0}.ab.imp{background:var(--al);color:var(--ac);border:1px solid #e8d0b0}.ab.dl{background:var(--sa);color:var(--tm);border:1px solid var(--bd)}
.smsg{font-size:.76rem;color:var(--gn);font-weight:600;padding:.5rem;opacity:0;transition:opacity .3s}
.ct{max-width:1260px;margin:.8rem auto 3rem;padding:0 1.5rem}.sec{margin-bottom:1.3rem}
.sh{display:flex;align-items:center;gap:.55rem;margin-bottom:.5rem;cursor:pointer;user-select:none}.sh h2{font-family:'Source Serif 4',serif;font-size:1.05rem;font-weight:700;color:var(--pr)}.sh .cn{font-size:.66rem;font-weight:600;padding:.1rem .45rem;border-radius:10px;background:var(--sa);color:var(--tm)}.sh .cv{font-size:.7rem;color:var(--tl);transition:transform .2s}.sh.cl .cv{transform:rotate(-90deg)}
.subh{margin:.8rem 0 .3rem .1rem;display:flex;align-items:center;gap:.5rem}.subh h3{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ac)}
.tw{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:.76rem}
thead th{background:var(--sa);padding:.45rem .5rem;text-align:left;font-weight:700;font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;color:var(--tm);border-bottom:2px solid var(--bd);white-space:nowrap;position:sticky;top:0;z-index:1}
tbody tr{border-bottom:1px solid var(--bl);transition:background .1s}tbody tr:hover{background:#faf8f4}
td{padding:.35rem .5rem;vertical-align:middle}td.nc{font-weight:600;white-space:nowrap;min-width:160px}td.nc .af{font-weight:400;color:var(--tm);font-size:.68rem;display:block}
td input[type=text]{width:100%;min-width:90px;padding:.25rem .4rem;border:1px solid transparent;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:.7rem;background:transparent;outline:none;transition:all .15s;color:var(--tx)}
td input:hover{border-color:var(--bd)}td input:focus{border-color:var(--pl);background:var(--sf);box-shadow:0 0 0 2px rgba(46,95,161,.1)}
td input.ok{color:var(--gn)}td input.no{color:var(--tl)}td input.no::placeholder{color:var(--tl);font-style:italic}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:.25rem}.dot.g{background:var(--gn)}.dot.p{background:var(--ac)}.dot.r{background:var(--rd)}
.ib{background:none;border:1px solid var(--bd);border-radius:5px;padding:.2rem .45rem;cursor:pointer;font-size:.7rem;color:var(--tm);transition:all .15s;line-height:1}.ib:hover{background:var(--pr);color:#fff;border-color:var(--pr)}.ib.del:hover{background:var(--rd);border-color:var(--rd)}
.addb{display:inline-flex;align-items:center;gap:.25rem;padding:.3rem .7rem;border:1px dashed var(--bd);border-radius:var(--r);font-family:inherit;font-size:.72rem;font-weight:600;color:var(--pl);background:transparent;cursor:pointer;transition:all .15s;margin-top:.4rem}.addb:hover{background:var(--pl);color:#fff;border-style:solid;border-color:var(--pl)}
.addsub{display:inline-flex;align-items:center;gap:.25rem;padding:.25rem .6rem;border:1px dashed var(--ac);border-radius:var(--r);font-family:inherit;font-size:.68rem;font-weight:600;color:var(--ac);background:transparent;cursor:pointer;transition:all .15s;margin:.5rem 0}.addsub:hover{background:var(--ac);color:#fff;border-style:solid}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem}.mbg.show{display:flex}
.mdl{background:var(--sf);border-radius:12px;max-width:900px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mh{padding:1rem 1.3rem;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}.mh h3{font-family:'Source Serif 4',serif;font-size:1.05rem;font-weight:700;color:var(--pr)}.mh button{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--tm);padding:.2rem}
.mb{padding:1rem 1.3rem;overflow-y:auto;flex:1}.mb pre{background:#1e1e2e;color:#cdd6f4;padding:1rem;border-radius:var(--r);font-family:'JetBrains Mono',monospace;font-size:.7rem;line-height:1.7;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.mb .frm{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}.mb .frm label{font-size:.72rem;font-weight:600;color:var(--tm);display:flex;flex-direction:column;gap:.2rem}.mb .frm input,.mb .frm select{padding:.45rem .6rem;border:1px solid var(--bd);border-radius:var(--r);font-family:inherit;font-size:.8rem;outline:none}.mb .frm input:focus,.mb .frm select:focus{border-color:var(--pl)}.mb .frm .full{grid-column:1/-1}
.mf{padding:.8rem 1.3rem;border-top:1px solid var(--bd);display:flex;gap:.4rem;justify-content:flex-end}.mf button{padding:.45rem 1rem;border:none;border-radius:var(--r);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer}.mf .cp{background:var(--pr);color:#fff}.mf .cp:hover{background:#142240}.mf .cl{background:var(--sa);color:var(--tx)}.mf .sv{background:var(--gn);color:#fff}.mf .sv:hover{background:#245a33}
footer{border-top:1px solid var(--bd);padding:1.2rem;text-align:center;font-size:.7rem;color:var(--tm)}footer a{color:var(--pl)}
@media(max-width:768px){header h1{font-size:1.3rem}.dash{grid-template-columns:repeat(2,1fr)}.tb,.acts{flex-direction:column}.tl{margin-left:0}.mb .frm{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="wrap"><h1>📋 PedPer — Profile Tracker</h1><div class="sub">Editör Kurulu &amp; Bilim Kurulu profil bilgi takip ve düzenleme · <a href="https://pedagogicalperspective.com" target="_blank">pedagogicalperspective.com</a></div><div class="hr" id="hB"></div></div></header>
<div class="tb"><input type="text" id="src" placeholder="İsim, kurum veya ülke ara…"><select id="fS"><option value="all">Tüm Bölümler</option></select><button class="fb on" data-f="all">Tümü</button><button class="fb" data-f="ok">✓ Tam</button><button class="fb" data-f="partial">◐ Kısmi</button><button class="fb" data-f="no">✗ Eksik</button><div class="tl"><a href="https://www.scopus.com/freelookup/form/author.uri" target="_blank">Scopus</a><a href="https://www.webofscience.com/wos/author/search" target="_blank">WoS</a><a href="https://orcid.org/orcid-search/search" target="_blank">ORCID</a><a href="https://ror.org/search" target="_blank">ROR</a></div></div>
<div class="dash" id="dash"></div>
<div class="acts"><button class="ab sav" onclick="sav()">💾 Kaydet</button><button class="ab exp" onclick="expAll()">📤 Tümünü Dışa Aktar</button><button class="ab exp" onclick="expFlt()" style="background:var(--pl)">📋 Filtreleneni Aktar</button><button class="ab imp" onclick="document.getElementById('impF').click()">📥 JSON İçe Aktar</button><button class="ab dl" onclick="dlJSON()">⬇ JSON İndir</button><button class="ab dl" onclick="dlAll()">⬇ Tüm Kartları İndir</button><button class="ab rst" onclick="rst()">🗑 Sıfırla</button><input type="file" id="impF" accept=".json" style="display:none" onchange="impJ(event)"><span class="smsg" id="sm">✓ Kaydedildi</span></div>
<div class="ct" id="ct"></div>
<div class="mbg" id="modal"><div class="mdl"><div class="mh"><h3 id="mT">OJS Çıktısı</h3><button onclick="cM()">×</button></div><div class="mb" id="mB"><pre id="mC"></pre></div><div class="mf" id="mF"><button class="cl" onclick="cM()">Kapat</button><button class="cp" onclick="cpC()">📋 Kopyala</button></div></div></div>
<footer>PedPer Profile Tracker · eISSN: 2822-4841 · Son güncelleme: <span id="upd"></span> · Veriler tarayıcıda saklanır · <a href="https://pedagogicalperspective.com">pedagogicalperspective.com</a></footer>
