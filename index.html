<style>
:root {
  --bg: #f8f7f4;
  --surface: #ffffff;
  --surface-alt: #f2f0ec;
  --border: #e2dfd8;
  --border-light: #ece9e2;
  --text: #2c2a25;
  --text-muted: #8a8680;
  --text-light: #b0aaa2;
  --primary: #1b2a4a;
  --primary-light: #2e5fa1;
  --accent: #c8782a;
  --accent-light: #f5e6d0;
  --green: #2d6a3f;
  --green-bg: #e8f5e9;
  --red: #b33a3a;
  --red-bg: #fce8e8;
  --yellow: #a07c1c;
  --yellow-bg: #fef8e0;
  --purple: #5c4db1;
  --purple-bg: #eeecf9;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.07);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }

/* ── HEADER ── */
header { background:var(--primary); color:#fff; padding:2.5rem 0 2rem; }
header .wrap { max-width:1200px; margin:0 auto; padding:0 1.5rem; }
header h1 { font-family:'Source Serif 4',serif; font-size:1.8rem; font-weight:700; letter-spacing:-0.02em; margin-bottom:0.25rem; }
header .sub { color:rgba(255,255,255,0.6); font-size:0.85rem; }
header .sub a { color:rgba(255,255,255,0.8); text-decoration:underline; }
.badge-row { display:flex; gap:0.5rem; margin-top:1rem; flex-wrap:wrap; }
.badge { display:inline-flex; align-items:center; gap:0.35rem; padding:0.3rem 0.7rem; border-radius:20px; font-size:0.75rem; font-weight:600; }
.badge.g { background:rgba(45,106,63,0.25); color:#a0eaaf; }
.badge.r { background:rgba(179,58,58,0.2); color:#f5a0a0; }
.badge.y { background:rgba(160,124,28,0.25); color:#f0d060; }

/* ── TOOLBAR ── */
.toolbar { max-width:1200px; margin:1.5rem auto 0; padding:0 1.5rem; display:flex; gap:0.75rem; flex-wrap:wrap; align-items:center; }
.toolbar input[type=text] { flex:1; min-width:200px; padding:0.6rem 1rem; border:1px solid var(--border); border-radius:var(--radius); font-family:inherit; font-size:0.85rem; background:var(--surface); outline:none; transition:border 0.2s; }
.toolbar input[type=text]:focus { border-color:var(--primary-light); }
.toolbar select { padding:0.6rem 0.8rem; border:1px solid var(--border); border-radius:var(--radius); font-family:inherit; font-size:0.85rem; background:var(--surface); cursor:pointer; outline:none; }
.filter-btn { padding:0.55rem 1rem; border:1px solid var(--border); border-radius:var(--radius); font-family:inherit; font-size:0.8rem; font-weight:600; cursor:pointer; background:var(--surface); transition:all 0.15s; }
.filter-btn:hover { background:var(--surface-alt); }
.filter-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.tool-links { display:flex; gap:0.4rem; margin-left:auto; }
.tool-link { padding:0.45rem 0.65rem; border-radius:var(--radius); font-size:0.7rem; font-weight:600; text-decoration:none; border:1px solid var(--border); color:var(--text-muted); transition:all 0.15s; }
.tool-link:hover { border-color:var(--primary-light); color:var(--primary); }

/* ── DASHBOARD ── */
.dashboard { max-width:1200px; margin:1.25rem auto; padding:0 1.5rem; display:grid; grid-template-columns:repeat(auto-fit, minmax(170px, 1fr)); gap:0.75rem; }
.stat-card { background:var(--surface); border:1px solid var(--border-light); border-radius:var(--radius); padding:1rem 1.1rem; box-shadow:var(--shadow); }
.stat-card .label { font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:0.4rem; }
.stat-card .num { font-family:'Source Serif 4',serif; font-size:1.6rem; font-weight:700; color:var(--primary); }
.stat-card .bar { margin-top:0.5rem; height:4px; background:var(--border-light); border-radius:2px; overflow:hidden; }
.stat-card .bar-fill { height:100%; border-radius:2px; transition:width 0.6s ease; }

/* ── SECTIONS ── */
.content { max-width:1200px; margin:1.5rem auto 3rem; padding:0 1.5rem; }
.section { margin-bottom:2rem; }
.section-hdr { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.75rem; cursor:pointer; user-select:none; }
.section-hdr h2 { font-family:'Source Serif 4',serif; font-size:1.15rem; font-weight:700; color:var(--primary); }
.section-hdr .count { font-size:0.7rem; font-weight:600; padding:0.15rem 0.55rem; border-radius:10px; background:var(--surface-alt); color:var(--text-muted); }
.section-hdr .chevron { font-size:0.8rem; color:var(--text-light); transition:transform 0.2s; }
.section-hdr.collapsed .chevron { transform:rotate(-90deg); }
.subsection { margin-bottom:1.25rem; }
.subsection h3 { font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--accent); margin-bottom:0.5rem; padding-left:0.25rem; }

/* ── TABLE ── */
.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:0.8rem; }
thead th { background:var(--surface-alt); padding:0.55rem 0.6rem; text-align:left; font-weight:700; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-muted); border-bottom:2px solid var(--border); white-space:nowrap; }
thead th:first-child { border-radius:var(--radius) 0 0 0; }
thead th:last-child { border-radius:0 var(--radius) 0 0; }
tbody tr { border-bottom:1px solid var(--border-light); transition:background 0.1s; }
tbody tr:hover { background:var(--surface-alt); }
tbody tr.highlight { background:#fff8e0; }
td { padding:0.5rem 0.6rem; vertical-align:middle; }
td.name { font-weight:600; color:var(--text); white-space:nowrap; min-width:180px; }
td.name .affil { font-weight:400; color:var(--text-muted); font-size:0.72rem; display:block; }

/* ── STATUS CELLS ── */
.s { display:inline-flex; align-items:center; gap:0.3rem; font-family:'JetBrains Mono',monospace; font-size:0.72rem; }
.s a { color:inherit; text-decoration:none; border-bottom:1px dashed transparent; transition:border-color 0.15s; }
.s a:hover { border-bottom-color:currentColor; }
.s.ok { color:var(--green); }
.s.no { color:var(--red); opacity:0.5; }
.s.ok::before { content:'✓'; font-weight:700; }
.s.no::before { content:'✗'; font-weight:700; }

/* ── PROGRESS INLINE ── */
.prog { display:flex; align-items:center; gap:0.5rem; }
.prog-bar { flex:1; height:6px; background:var(--border-light); border-radius:3px; overflow:hidden; min-width:50px; }
.prog-fill { height:100%; border-radius:3px; }
.prog-pct { font-size:0.7rem; font-weight:700; font-family:'JetBrains Mono',monospace; min-width:35px; text-align:right; }

/* ── FOOTER ── */
footer { border-top:1px solid var(--border); padding:1.5rem; text-align:center; font-size:0.75rem; color:var(--text-muted); }
footer a { color:var(--primary-light); }

/* ── RESPONSIVE ── */
@media(max-width:768px) {
  header h1 { font-size:1.4rem; }
  .dashboard { grid-template-columns:repeat(2,1fr); }
  .toolbar { flex-direction:column; }
  .tool-links { margin-left:0; }
}
</style>

// HELPERS
// ══════════════════════════════════════════════
var fields = ["mail","orcid","scopus","wos","ror"];
function urls(f,v){
  if(!v) return "";
  if(f==="orcid") return "https://orcid.org/"+v;
  if(f==="scopus") return "https://www.scopus.com/authid/detail.uri?authorId="+v;
  if(f==="wos") return "https://www.webofscience.com/wos/author/record/"+v;
  if(f==="ror") return "https://ror.org/"+v;
  return "mailto:"+v;
}
function cell(f,v){
  if(!v) return '<span class="s no"></span>';
  var u=urls(f,v);
  var label = f==="mail"?v : v;
  if(label.length>18) label=label.substring(0,16)+"…";
  return '<span class="s ok"><a href="'+u+'" target="_blank" title="'+v+'">'+label+'</a></span>';
}
function completion(arr){
  var t=0,ok=0;
  arr.forEach(function(p){fields.forEach(function(f){t++;if(p[f])ok++;});});
  return t?Math.round(ok/t*100):0;
}
function statusClass(p){
  var ok=0; fields.forEach(function(f){if(p[f])ok++;});
  if(ok===5) return "ok";
  if(ok===0) return "no";
  return "partial";
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render(){
  var q=document.getElementById("search").value.toLowerCase();
  var secF=document.getElementById("filterSection").value;
  var statF=document.querySelector(".filter-btn.active").dataset.f;

  // group
  var sections={};
  D.forEach(function(p,i){
    p._i=i;
    p._status=statusClass(p);
    var show=true;
    if(q && (p.name+p.aff+p.co+p.sub).toLowerCase().indexOf(q)<0) show=false;
    if(secF!=="all" && p.sec!==secF) show=false;
    if(statF!=="all" && p._status!==statF) show=false;
    if(!show) return;
    if(!sections[p.sec]) sections[p.sec]=[];
    sections[p.sec].push(p);
  });

  // dashboard
  var secOrder=["Editor in Chief","Editorial Board","Language Editors","Secretary","Recommended Candidates","Scientific Advisory Board"];
  var dash=document.getElementById("dashboard");
  dash.innerHTML="";
  var totalAll=0,okAll=0,totPeople=0;
  secOrder.forEach(function(s){
    var items=D.filter(function(p){return p.sec===s;});
    var pct=completion(items);
    var col=pct>=80?"var(--green)":pct>=40?"var(--accent)":"var(--red)";
    totPeople+=items.length;
    items.forEach(function(p){fields.forEach(function(f){totalAll++;if(p[f])okAll++;});});
    dash.innerHTML+='<div class="stat-card"><div class="label">'+s+'</div><div class="num">'+pct+'%</div><div style="font-size:0.7rem;color:var(--text-muted)">'+items.length+' kişi</div><div class="bar"><div class="bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>';
  });
  // total
  var totalPct=totalAll?Math.round(okAll/totalAll*100):0;
  var totalCol=totalPct>=80?"var(--green)":totalPct>=40?"var(--accent)":"var(--red)";
  dash.innerHTML='<div class="stat-card" style="border-color:var(--primary);border-width:2px"><div class="label">Genel</div><div class="num">'+totalPct+'%</div><div style="font-size:0.7rem;color:var(--text-muted)">'+totPeople+' kişi · '+okAll+'/'+totalAll+' alan</div><div class="bar"><div class="bar-fill" style="width:'+totalPct+'%;background:'+totalCol+'"></div></div></div>'+dash.innerHTML;

  // badges
  var missing=totalAll-okAll;
  document.getElementById("headerBadges").innerHTML='<span class="badge g">✓ '+okAll+' doğrulanmış</span><span class="badge r">✗ '+missing+' eksik</span><span class="badge y">'+totPeople+' araştırmacı</span>';

  // content
  var html="";
  secOrder.forEach(function(s){
    if(!sections[s]) return;
    var items=sections[s];
    var pct=completion(items);
    html+='<div class="section"><div class="section-hdr" onclick="toggleSec(this)"><span class="chevron">▼</span><h2>'+s+'</h2><span class="count">'+items.length+' kişi · '+pct+'%</span></div><div class="section-body">';

    var subs={};
    items.forEach(function(p){var k=p.sub||"_";if(!subs[k])subs[k]=[];subs[k].push(p);});

    Object.keys(subs).forEach(function(k){
      if(k!=="_") html+='<div class="subsection"><h3>'+k+'</h3>';
      html+='<div class="tbl-wrap"><table><thead><tr><th>#</th><th>İsim / Kurum</th><th>Ülke</th><th>E-posta</th><th>ORCID</th><th>Scopus</th><th>WoS</th><th>ROR</th></tr></thead><tbody>';
      subs[k].forEach(function(p,j){
        html+='<tr class="'+p._status+'"><td>'+(j+1)+'</td><td class="name">'+p.name+'<span class="affil">'+p.aff+'</span></td><td>'+p.co+'</td><td>'+cell("mail",p.mail)+'</td><td>'+cell("orcid",p.orcid)+'</td><td>'+cell("scopus",p.scopus)+'</td><td>'+cell("wos",p.wos)+'</td><td>'+cell("ror",p.ror)+'</td></tr>';
      });
      html+='</tbody></table></div>';
      if(k!=="_") html+='</div>';
    });
    html+='</div></div>';
  });
  document.getElementById("content").innerHTML=html;
}

function toggleSec(el){
  el.classList.toggle("collapsed");
  var body=el.nextElementSibling;
  body.style.display=body.style.display==="none"?"":"none";
}

// filters
document.querySelectorAll(".filter-btn").forEach(function(b){
  b.addEventListener("click",function(){
    document.querySelectorAll(".filter-btn").forEach(function(x){x.classList.remove("active");});
    b.classList.add("active");
    render();
  });
});
document.getElementById("search").addEventListener("input",render);
document.getElementById("filterSection").addEventListener("change",render);

// populate section filter
var seen={};
D.forEach(function(p){if(!seen[p.sec]){seen[p.sec]=1;var o=document.createElement("option");o.value=p.sec;o.textContent=p.sec;document.getElementById("filterSection").appendChild(o);}});

document.getElementById("lastUpdate").textContent=new Date().toISOString().split("T")[0];
render();
</script>
